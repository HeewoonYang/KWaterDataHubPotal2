apiVersion: v1
kind: ConfigMap
metadata:
  name: datahub-config
  namespace: datahub
data:
  DATABASE_URL: "postgresql+asyncpg://datahub:datahub@postgres-svc:5432/datahub"
  DATABASE_URL_SYNC: "postgresql+psycopg://datahub:datahub@postgres-svc:5432/datahub"
  REDIS_URL: "redis://redis-svc:6379/0"
  OPENMETADATA_URL: "http://openmetadata-svc:8585/api"
  # 유통 API 엔드포인트 (폐쇄망 이전 시 내부 URL로 변경)
  DISTRIBUTION_API_ENDPOINT: "https://api.kwater.or.kr/data/v1/query"
  # SAML 2.0 (폐쇄망 이전 시 내부 IdP URL로 변경)
  SAML_SP_ENTITY_ID: "https://datahub.kwater.or.kr"
  SAML_SP_ACS_URL: "https://datahub.kwater.or.kr/api/v1/sso/saml/acs"
  SAML_IDP_ENTITY_ID: "https://oasis.kwater.or.kr/idp"
  SAML_IDP_SSO_URL: "https://oasis.kwater.or.kr/idp/sso"
  # ERP 연계 (폐쇄망 이전 시 내부 ERP URL로 변경)
  ERP_API_URL: "https://erp.kwater.or.kr/api/hr"
  # 운영 CORS: 실제 도메인 allowlist 만 기재 (와일드카드 금지)
  CORS_ORIGINS: '["https://datahub.kwater.or.kr"]'
  # Object Storage (MinIO 호환)
  OBJECT_STORAGE_ENDPOINT: "minio-svc:9000"
  OBJECT_STORAGE_BUCKET: "datahub"
  OBJECT_STORAGE_SECURE: "false"
  OBJECT_STORAGE_REGION: "us-east-1"
  # 워커 수 (HPA 와 별개로 파드 내부 uvicorn 워커 개수)
  WEB_CONCURRENCY: "4"
  # Frontend 런타임 ENV (docker-entrypoint.sh 에서 window.__ENV__ 주입)
  API_BASE_URL: "/api/v1"
  APP_ENV: "production"
