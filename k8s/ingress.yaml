apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datahub-ingress
  namespace: datahub
  annotations:
    # ── 기본 프록시 튜닝 ──
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # ── TLS / 리다이렉트 ──
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"   # 사내 CA 사용 시 해당 ClusterIssuer 이름으로 교체
    # ── 보안 헤더 (HSTS, XFO, Referrer 등) ──
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # ── Rate limit (5 req/s per IP, burst 10) ──
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - datahub.kwater.or.kr
      secretName: datahub-tls
  rules:
    - host: datahub.kwater.or.kr
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /livez
            pathType: Exact
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
