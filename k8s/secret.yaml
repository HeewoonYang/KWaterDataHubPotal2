# ⚠️ 이 파일은 "템플릿" 입니다. 평문 값을 커밋하지 마세요.
#
# 운영 배포 시 아래 중 하나로 대체하세요:
#   1) Sealed Secrets  : kubeseal < secret.local.yaml > secret.sealed.yaml
#   2) External Secrets: ExternalSecretsOperator + Vault / AWS Secrets Manager 등
#   3) kubectl 수동 주입: kubectl -n datahub create secret generic datahub-secret \
#        --from-literal=POSTGRES_USER=... \
#        --from-literal=POSTGRES_PASSWORD=... \
#        --from-literal=JWT_SECRET_KEY=... \
#        --from-literal=OBJECT_STORAGE_ACCESS_KEY=... \
#        --from-literal=OBJECT_STORAGE_SECRET_KEY=...
#
# JWT_SECRET_KEY 는 16자 이상 무작위 문자열을 권장합니다 (예: `openssl rand -hex 32`).
apiVersion: v1
kind: Secret
metadata:
  name: datahub-secret
  namespace: datahub
type: Opaque
stringData:
  POSTGRES_USER: "<REDACTED>"
  POSTGRES_PASSWORD: "<REDACTED>"
  JWT_SECRET_KEY: "<REDACTED>"
  OBJECT_STORAGE_ACCESS_KEY: "<REDACTED>"
  OBJECT_STORAGE_SECRET_KEY: "<REDACTED>"
