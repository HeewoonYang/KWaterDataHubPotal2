apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: datahub
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: registry.kwater.or.kr/datahub/backend:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: datahub-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: datahub-secret
                  key: JWT_SECRET_KEY
            - name: OBJECT_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: datahub-secret
                  key: OBJECT_STORAGE_ACCESS_KEY
            - name: OBJECT_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: datahub-secret
                  key: OBJECT_STORAGE_SECRET_KEY
          # ── Probe 분리 ──
          startupProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30   # 최대 150초 startup 허용
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # ── Graceful shutdown 유예 ──
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # uvicorn 임시파일 필요 시 true 로 조정하며 emptyDir 마운트
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: datahub
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
